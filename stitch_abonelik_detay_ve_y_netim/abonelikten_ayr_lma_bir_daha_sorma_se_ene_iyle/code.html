<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>

            background-color: rgba(248, 249, 250, 0.8);

            darkMode: "class",

                extend: {

                        "tertiary-fixed": "#ffdad6",

                        "inverse-primary": "#b2c5ff",
                        "on-secondary-fixed-variant": "#304a55",
                        "surface-dim": "#d9dadb",
                        "on-background": "#191c1d",
                        "on-surface": "#191c1d",
                        "on-primary-fixed-variant": "#0040a1",
                        "on-secondary-fixed": "#021f29",
                        "on-primary-container": "#ccd8ff",
                        "on-error": "#ffffff",
                        "inverse-surface": "#2e3132",
                        "primary-container": "#0056d2",
                        "surface-container": "#edeeef",
                        "primary-fixed-dim": "#b2c5ff",
                        "on-surface-variant": "#424654",
                        "surface-container-highest": "#e1e3e4",
                        "surface-tint": "#0056d2",
                        "surface-bright": "#f8f9fa",
                        "on-tertiary": "#ffffff",
                        "outline-variant": "#c3c6d6",
                        "secondary-container": "#cbe7f5",
                        "secondary-fixed-dim": "#afcbd8",
                        "primary-fixed": "#dae2ff",
                        "on-tertiary-fixed-variant": "#930010",
                        "inverse-on-surface": "#f0f1f2",
                        "surface-variant": "#e1e3e4",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "error": "#ba1a1a",
                        "surface": "#f8f9fa",
                        "surface-container-low": "#f3f4f5",
                        "secondary-fixed": "#cbe7f5",
                        "on-secondary": "#ffffff",
                        "on-error-container": "#93000a",
                        "on-secondary-container": "#4e6874",
                        "secondary": "#48626e",
                        "surface-container-high": "#e7e8e9",
                        "on-tertiary-container": "#ffcdc8",
                        "on-tertiary-fixed": "#410003",
                        "tertiary": "#940010",
                        "surface-container-lowest": "#ffffff",
                        "background": "#f8f9fa",
                        "on-primary-fixed": "#001847"
                    },
                    fontFamily: {
                        "headline": ["Manrope"],
                        "body": ["Inter"],
                        "label": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-surface font-body text-on-surface antialiased">
<!-- Background Content (Simulated Inbox Shell) -->
<div class="min-h-screen flex flex-col">
<!-- TopAppBar - Execution from JSON -->
<header class="bg-[#f8f9fa] dark:bg-slate-950 flex justify-between items-center w-full px-6 py-4 max-w-xl mx-auto fixed top-0 left-1/2 -translate-x-1/2 z-10">
<div class="flex items-center gap-3">
<div class="w-10 h-10 rounded-full bg-primary-fixed flex items-center justify-center overflow-hidden">
<img class="w-full h-full object-cover" data-alt="professional male portrait avatar with neutral background and soft studio lighting" src="https://lh3.googleusercontent.com/aida-public/AB6AXuApp5gcZawahEWNCh3INioEZJPoAtqcJ4Sht3iJKGNj7NJCumTqUICE926ya2NymSyGNPWoDYxvU34tjSgVYVIM0TN29adYJpzVxcCAWItDwePJl-hamJw4v63uPT2VYELLPm6Si3sMyj7UBC2oV12JVbuhJJi4jtCWW-qyr0mw4yh8-f_qEa5tntwnkcWx83F031qDhG6H2uwpRlTfSRObbpGVWu-B71zC3zR3QJ-UUCX7S-KPj9mwClLXj7CZqvMKtpdnJf0ffeZD"/>
</div>
<h1 class="font-headline font-bold text-2xl tracking-tight text-[#191c1d] dark:text-slate-100">The Curator</h1>
</div>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-[#f3f4f5] dark:hover:bg-slate-800 transition-colors text-[#0056D2] dark:text-blue-400">
<span class="material-symbols-outlined" data-icon="search">search</span>
</button>
</header>
<!-- Main Content Canvas (Background) -->
<main class="flex-1 mt-20 px-6 pb-24 max-w-xl mx-auto w-full">
<div class="space-y-4">
<div class="h-32 w-full bg-surface-container-low rounded-xl"></div>
<div class="h-32 w-full bg-surface-container-low rounded-xl"></div>
<div class="h-32 w-full bg-surface-container-low rounded-xl"></div>
</div>
</main>
<!-- BottomNavBar - Execution from JSON -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-4 pb-6 pt-2 bg-[#ffffffcc] dark:bg-slate-900/80 backdrop-blur-xl shadow-[0_-4px_40px_rgba(25,28,29,0.04)] rounded-t-[1.5rem] md:hidden">
<div class="flex flex-col items-center justify-center bg-[#0056D2]/10 dark:bg-blue-900/30 text-[#0056D2] dark:text-blue-300 rounded-2xl px-5 py-2">
<span class="material-symbols-outlined mb-1" data-icon="home_storage" style="font-variation-settings: 'FILL' 1;">home_storage</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Home</span>
</div>
<div class="flex flex-col items-center justify-center text-[#48626e] dark:text-slate-500 px-5 py-2 hover:text-[#0056D2] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="analytics">analytics</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Activity</span>
</div>
<div class="flex flex-col items-center justify-center text-[#48626e] dark:text-slate-500 px-5 py-2 hover:text-[#0056D2] transition-colors">
<span class="material-symbols-outlined mb-1" data-icon="settings">settings</span>
<span class="font-inter text-[11px] font-semibold uppercase tracking-wider">Settings</span>
</div>
</nav>
</div>
<!-- Confirmation Modal Overlay -->
<div class="fixed inset-0 z-[100] flex items-center justify-center p-6 glass-overlay">
<!-- Modal Card -->
<div class="w-full max-w-sm bg-surface-container-lowest rounded-[2rem] p-8 shadow-[0_20px_60px_-15px_rgba(25,28,29,0.1)] flex flex-col items-center text-center animate-in fade-in zoom-in duration-300">
<!-- Alert Icon Container -->
<div class="w-20 h-20 bg-tertiary-fixed rounded-3xl flex items-center justify-center mb-8 rotate-3">
<span class="material-symbols-outlined text-on-tertiary-fixed-variant text-4xl" data-icon="notifications_off" style="font-variation-settings: 'FILL' 0;">notifications_off</span>
</div>
<!-- Content -->
<h2 class="font-headline text-2xl font-extrabold text-on-surface tracking-tight mb-4">
                Unsubscribe from The Weekly Digest?
            </h2>
<p class="font-body text-secondary text-sm leading-relaxed px-2 mb-6">
                You will no longer receive future emails from this sender. This action will help clear your digital space.
            </p>
<!-- Actions -->
<div class="flex items-center gap-3 mb-8 self-start px-2 cursor-pointer group">
<div class="relative flex items-center">
<input class="peer h-5 w-5 cursor-pointer appearance-none rounded border-2 border-outline-variant bg-surface transition-all checked:bg-primary checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20" id="dont-show" type="checkbox"/>
<span class="material-symbols-outlined absolute text-on-primary opacity-0 pointer-events-none peer-checked:opacity-100 text-sm left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2" style="font-variation-settings: 'wght' 700;">check</span>
</div>
<label class="font-body text-sm text-on-surface-variant cursor-pointer group-hover:text-on-surface transition-colors" for="dont-show">
        Don't show this again
    </label>
</div><div class="w-full flex flex-col gap-3">
<!-- Primary Action: Unsubscribe -->
<button class="w-full py-4 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-2xl transition-all hover:opacity-90 active:scale-[0.98] shadow-lg shadow-primary/20">
                    Unsubscribe
                </button>
<!-- Secondary Action: Keep Subscription -->
<button class="w-full py-4 bg-surface-container-low text-on-surface-variant font-headline font-bold rounded-2xl transition-all hover:bg-surface-container-high active:scale-[0.98]">
                    Keep Subscription
                </button>
</div>
</div>
</div>
</body></html>
